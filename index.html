<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lotus Zing — What's been raised</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f10;--surface:#1a1a1c;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);
  --text:#f0f0f0;--muted:#777;--muted2:#444;
  --accent:#e8c547;--urgent:#e05c4b;--moderate:#e8943a;--low:#4caf7d;
  --tag-bg:rgba(255,255,255,0.05);
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.5;min-height:100vh}
.nb-header{background:rgba(15,15,16,0.95);border-bottom:1px solid var(--border);padding:20px 24px;position:sticky;top:0;backdrop-filter:blur(12px);z-index:100;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:8px}
.nb-eyebrow{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted2);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px}
.nb-title{font-size:20px;font-weight:500;letter-spacing:-0.02em}
.nb-title span{color:var(--accent)}
.nb-updated{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted2);text-align:right}
.nb-stats{display:flex;border-bottom:1px solid var(--border)}
.nb-stat{padding:16px 24px;border-right:1px solid var(--border);flex:1;text-align:center}
.nb-stat:last-child{border-right:none}
.nb-stat-num{font-size:28px;font-weight:600;letter-spacing:-0.04em;line-height:1}
.nb-stat-num.urg{color:var(--urgent)}
.nb-stat-lbl{font-size:10px;font-family:'DM Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-top:3px}
.nb-heat{padding:16px 24px;border-bottom:1px solid var(--border);max-width:900px;margin:0 auto;width:100%}
.section-eye{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px}
.tower-bars{display:flex;gap:8px;align-items:flex-end;height:52px}
.tbar-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.tbar{width:100%;border-radius:2px 2px 0 0;min-height:2px;position:relative;cursor:default;transition:opacity 0.15s}
.tbar:hover{opacity:0.75}
.tbar-cnt{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);position:absolute;top:-14px;left:50%;transform:translateX(-50%);white-space:nowrap}
.tbar-lbl{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted2)}
.nb-filters{padding:12px 24px;border-bottom:1px solid var(--border);display:flex;gap:7px;flex-wrap:wrap;align-items:center;max-width:900px;margin:0 auto;width:100%}
.flt-btn{background:var(--tag-bg);border:1px solid var(--border);color:var(--muted);font-size:11px;font-family:'DM Sans',sans-serif;padding:5px 12px;border-radius:999px;cursor:pointer;transition:all 0.15s;white-space:nowrap}
.flt-btn:hover{border-color:var(--border2);color:var(--text)}
.flt-btn.on{background:var(--accent);border-color:var(--accent);color:#0f0f10;font-weight:500}
.flt-div{width:1px;height:18px;background:var(--border);margin:0 2px}
.nb-cards{padding:16px 24px 48px;max-width:900px;margin:0 auto;width:100%}
.nb-cards-hdr{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted2);margin-bottom:12px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:15px 18px;margin-bottom:8px;position:relative;overflow:hidden;transition:border-color 0.15s}
.card:hover{border-color:var(--border2)}
.card.isnew{border-color:var(--accent);background:rgba(232,197,71,0.04)}
.card.isnew::after{content:'just logged';position:absolute;top:0;right:0;background:var(--accent);color:#0f0f10;font-size:9px;font-weight:600;font-family:'DM Mono',monospace;padding:3px 10px;border-radius:0 9px 0 5px;letter-spacing:0.05em;text-transform:uppercase}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:8px}
.card-left{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.udot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:2px}
.udot.urgent{background:var(--urgent);box-shadow:0 0 6px rgba(224,92,75,0.5)}
.udot.moderate{background:var(--moderate)}
.udot.low{background:var(--low)}
.card-type{font-size:14px;font-weight:500}
.card-loc{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace}
.card-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.tbadge{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);background:var(--tag-bg);border:1px solid var(--border);padding:2px 8px;border-radius:4px;white-space:nowrap}
.dur{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted2)}
.card-desc{font-size:13px;color:#999;line-height:1.55;margin-bottom:9px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-bottom{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.tag{font-size:10px;font-family:'DM Mono',monospace;padding:2px 8px;border-radius:4px;border:1px solid var(--border);color:var(--muted);background:var(--tag-bg);white-space:nowrap}
.tag.rep{border-color:rgba(224,92,75,0.3);color:var(--urgent);background:rgba(224,92,75,0.08)}
.tag.res{border-color:rgba(76,175,125,0.3);color:var(--low);background:rgba(76,175,125,0.08)}
.card-date{margin-left:auto;font-family:'DM Mono',monospace;font-size:9px;color:var(--muted2)}
.nb-footer{border-top:1px solid var(--border);padding:20px 24px;text-align:center}
.nb-footer a{font-size:12px;color:var(--accent);text-decoration:none;font-family:'DM Mono',monospace;letter-spacing:0.02em}
.nb-footer a:hover{text-decoration:underline}
.state-msg{text-align:center;padding:60px 24px;color:var(--muted)}
.state-msg h3{font-size:15px;font-weight:400;margin-bottom:8px}
.state-msg p{font-size:12px;color:var(--muted2);line-height:1.8}
@media(max-width:600px){
  .nb-title{font-size:17px}
  .nb-stat{padding:12px 12px}
  .nb-stat-num{font-size:22px}
  .card{padding:12px 14px}
  .nb-heat,.nb-filters,.nb-cards{padding-left:16px;padding-right:16px}
}
</style>
</head>
<body>

<header class="nb-header">
  <div>
    <div class="nb-eyebrow">Lotus Zing · Sector 168, Noida</div>
    <div class="nb-title">What your neighbors have <span>raised</span></div>
  </div>
  <div class="nb-updated" id="nbUpdated">fetching…</div>
</header>

<div class="nb-stats">
  <div class="nb-stat"><div class="nb-stat-num" id="sTotal">—</div><div class="nb-stat-lbl">Logged</div></div>
  <div class="nb-stat"><div class="nb-stat-num urg" id="sUrgent">—</div><div class="nb-stat-lbl">Urgent</div></div>
  <div class="nb-stat"><div class="nb-stat-num" id="sTypes">—</div><div class="nb-stat-lbl">Issue types</div></div>
  <div class="nb-stat"><div class="nb-stat-num" id="sTowers">—</div><div class="nb-stat-lbl">Towers</div></div>
</div>

<div class="nb-heat">
  <div class="section-eye">Complaints by tower</div>
  <div class="tower-bars" id="towerBars"><span style="font-size:11px;color:#333;font-family:'DM Mono',monospace">loading…</span></div>
</div>

<div class="nb-filters" id="filtersRow">
  <button class="flt-btn on" onclick="setU(null,this)">All</button>
  <div class="flt-div"></div>
  <button class="flt-btn" onclick="setU('urgent',this)">Urgent</button>
  <button class="flt-btn" onclick="setU('moderate',this)">Moderate</button>
  <button class="flt-btn" onclick="setU('low',this)">Not urgent</button>
</div>

<div class="nb-cards">
  <div class="nb-cards-hdr" id="cardsHdr"></div>
  <div id="cardsGrid"><div class="state-msg"><h3>fetching your live log…</h3></div></div>
</div>

<footer class="nb-footer">
  <a href="https://tally.so/r/xXgPWy" target="_blank">+ add something to the log →</a>
</footer>

<script>
const CSV_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vR8bLKKQLiw9QsfWj3VHqVx7jgdX-MPyOrvViG74pr1uUA9VpYBSrQMfVQhKLEi6oN6bZMyZrYJU7oY/pub?gid=0&single=true&output=csv';

let all=[],activeU=null,activeT=null;

function urg(r){
  if(!r)return'low';
  const l=r.toLowerCase();
  if(l.includes('urgent')||l.includes('daily')||l.includes('pretty'))return'urgent';
  if(l.includes('annoy')||l.includes('manag'))return'moderate';
  return'low';
}

function since(r){
  if(!r)return'';
  try{
    const d=new Date(r),diff=Date.now()-d.getTime(),days=Math.floor(diff/86400000);
    if(days===0)return'today';
    if(days===1)return'1d ago';
    if(days<7)return days+'d ago';
    if(days<30)return Math.floor(days/7)+'w ago';
    return Math.floor(days/30)+'mo ago';
  }catch{return''}
}

function ignored(r){
  if(!r)return false;
  const l=r.toLowerCase();
  return l.includes('multiple')||l.includes('writing')||l.includes('verbal');
}

function parseCSV(text){
  const lines=text.trim().split('\n');
  if(lines.length<2)return[];
  const hdrs=parseLine(lines[0]);
  return lines.slice(1).map(line=>{
    const cols=parseLine(line);
    const obj={};
    hdrs.forEach((h,i)=>obj[h]=(cols[i]||'').trim());
    return obj;
  });
}

function parseLine(line){
  const cols=[];let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'&&!inQ){inQ=true;}
    else if(ch==='"'&&inQ&&line[i+1]==='"'){cur+='"';i++;}
    else if(ch==='"'&&inQ){inQ=false;}
    else if(ch===','&&!inQ){cols.push(cur);cur='';}
    else{cur+=ch;}
  }
  cols.push(cur);
  return cols.map(c=>c.replace(/^"|"$/g,''));
}

async function load(){
  try{
    const res=await fetch(CSV_URL+'&cachebust='+Date.now());
    if(!res.ok)throw new Error('fetch failed');
    const text=await res.text();
    const rows=parseCSV(text);
    all=rows.map(r=>({
      id:r['Submission ID']||'',
      submittedAt:r['Submitted at']||'',
      name:r['Your name']||'',
      tower:r['Tower']||'',
      flat:r['Flat number']||'',
      issueType:r['What kind of issue is this?']||'',
      description:r['Describe it in your own words']||'',
      location:r['Where exactly?']||'',
      duration:r['How long has this been going on?']||'',
      urgencyRaw:r['How urgent does this feel to you?']||'',
      urgency:urg(r['How urgent does this feel to you?']||''),
      reportedBefore:r['Have you reported this to the maintenance team before?']||'',
      residents:r['Roughly how many residents are affected?']||'',
      priorResponse:r['What happened when you reported it before?']||''
    })).filter(r=>r.issueType||r.description);
    all.sort((a,b)=>{
      const o={urgent:0,moderate:1,low:2};
      if(o[a.urgency]!==o[b.urgency])return o[a.urgency]-o[b.urgency];
      return new Date(b.submittedAt)-new Date(a.submittedAt);
    });
    const now=new Date();
    document.getElementById('nbUpdated').innerHTML=
      now.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})+
      '<br><span style="color:#333;font-size:9px">auto-refreshes every 60s</span>';
    render();
  }catch(e){
    document.getElementById('cardsGrid').innerHTML=`<div class="state-msg">
      <h3>Couldn't load</h3>
      <p>Check that the sheet is published as CSV:<br>File → Share → Publish to web → Live Log → CSV</p>
    </div>`;
  }
}

function render(){
  const urgent=all.filter(i=>i.urgency==='urgent').length;
  const types=[...new Set(all.map(i=>i.issueType).filter(Boolean))];
  const towers=[...new Set(all.map(i=>i.tower).filter(Boolean))];
  document.getElementById('sTotal').textContent=all.length;
  document.getElementById('sUrgent').textContent=urgent;
  document.getElementById('sTypes').textContent=types.length;
  document.getElementById('sTowers').textContent=towers.length;

  const tc={};
  all.forEach(i=>{if(i.tower)tc[i.tower]=(tc[i.tower]||0)+1});
  const tOrder=['Tower 1','Tower 2','Tower 3','Tower 4','Tower 5','Tower 6','Tower 15','Tower 16'];
  const mx=Math.max(...Object.values(tc),1);
  document.getElementById('towerBars').innerHTML=tOrder.map(t=>{
    const n=tc[t]||0;
    const h=Math.max((n/mx)*38,n>0?5:2);
    const col=n===0?'#1e1e20':n===mx?'#e05c4b':n>mx*0.6?'#e8943a':'#e8c547';
    return`<div class="tbar-wrap">
      <div class="tbar" style="height:${h}px;background:${col}" title="${t}: ${n} issue${n!==1?'s':''}">
        ${n>0?`<span class="tbar-cnt">${n}</span>`:''}
      </div>
      <span class="tbar-lbl">${t.replace('Tower ','T')}</span>
    </div>`;
  }).join('');

  const fr=document.getElementById('filtersRow');
  fr.querySelectorAll('[data-type]').forEach(b=>b.remove());
  fr.querySelectorAll('.type-div').forEach(b=>b.remove());
  if(types.length){
    const d=document.createElement('div');
    d.className='flt-div type-div';
    fr.appendChild(d);
    types.sort().forEach(t=>{
      const b=document.createElement('button');
      b.className='flt-btn'+(activeT===t?' on':'');
      b.dataset.type=t;
      b.textContent=t;
      b.onclick=()=>setT(t,b);
      fr.appendChild(b);
    });
  }
  renderCards();
}

function renderCards(){
  let f=all;
  if(activeU)f=f.filter(i=>i.urgency===activeU);
  if(activeT)f=f.filter(i=>i.issueType===activeT);
  document.getElementById('cardsHdr').textContent=
    `${f.length} issue${f.length!==1?'s':''} showing`;
  if(!f.length){
    document.getElementById('cardsGrid').innerHTML=
      '<div class="state-msg"><h3>Nothing matching that filter</h3></div>';
    return;
  }
  const newest=[...all].sort((a,b)=>new Date(b.submittedAt)-new Date(a.submittedAt))[0];
  const uLabel={urgent:'Urgent',moderate:'Moderate',low:'Not urgent'};
  document.getElementById('cardsGrid').innerHTML=f.map(i=>{
    const isNew=i.id&&i.id===newest?.id;
    const ign=ignored(i.reportedBefore)&&!i.reportedBefore.toLowerCase().includes('first time');
    const res=parseInt(i.residents)||0;
    const tf=[i.tower,i.flat?'Flat '+i.flat:''].filter(Boolean).join(' · ');
    return`<div class="card${isNew?' isnew':''}">
      <div class="card-top">
        <div class="card-left">
          <div class="udot ${i.urgency}"></div>
          <span class="card-type">${i.issueType||'Issue'}</span>
          ${i.location?`<span class="card-loc">· ${i.location}</span>`:''}
        </div>
        <div class="card-right">
          ${tf?`<span class="tbadge">${tf}</span>`:''}
          ${i.duration?`<span class="dur">${i.duration}</span>`:''}
        </div>
      </div>
      ${i.description?`<div class="card-desc">${i.description}</div>`:''}
      <div class="card-bottom">
        <span class="tag">${uLabel[i.urgency]||i.urgencyRaw}</span>
        ${ign?'<span class="tag rep">raised before — ignored</span>':''}
        ${res>1?`<span class="tag res">${res} residents</span>`:''}
        <span class="card-date">${since(i.submittedAt)}</span>
      </div>
    </div>`;
  }).join('');
}

function setU(val,btn){
  activeU=(activeU===val)?null:val;
  activeT=null;
  document.querySelectorAll('.flt-btn').forEach(b=>b.classList.remove('on'));
  if(activeU)btn.classList.add('on');
  else document.querySelector('.flt-btn:first-child').classList.add('on');
  renderCards();
}
function setT(val,btn){
  activeT=(activeT===val)?null:val;
  activeU=null;
  document.querySelectorAll('.flt-btn').forEach(b=>b.classList.remove('on'));
  if(activeT)btn.classList.add('on');
  else document.querySelector('.flt-btn:first-child').classList.add('on');
  renderCards();
}

load();
setInterval(load,60000);
</script>
</body>
</html>
